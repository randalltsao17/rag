version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rag-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  app:
    image: python:3.12-slim
    container_name: rag-app
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TASK_WORKSPACE=/workspace/shared/coding
    volumes:
      - ./app:/app
      - ./notes:/notes
      - ../:/workspace/shared/coding:ro
    command: bash -lc "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      - db

  n8n:
    image: n8nio/n8n:latest
    container_name: rag-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=n8n.randall117.com
      - WEBHOOK_URL=n8n.randall117.com
      - TZ=Asia/Taipei
      - GENERIC_TIMEZONE=Asia/Taipei
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - app

  adminer:
    image: adminer:latest
    container_name: rag-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"

volumes:
  pgdata:
  n8n_data:
