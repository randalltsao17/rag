services:
  app:
    image: python:3.12-slim
    container_name: rag-app-test
    working_dir: /app
    env_file:
      - .env
    environment:
      - TASK_WORKSPACE=/workspace/shared/coding
      - RESEARCH_TOPICS_PATH=/workspace/shared/research/topics.md
    volumes:
      - ./app:/app
      - ./notes:/notes
      - ../../:/workspace/shared/coding
      - ../../../research:/workspace/shared/research
    command: bash -lc "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "18000:8000"
